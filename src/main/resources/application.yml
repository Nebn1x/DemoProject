spring:
  application:
    name: mock-it-backend

  # PostgreSQL - через .env (AWS RDS), з дефолтом для локалки
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mockit}
    username: ${DB_USERNAME:mockit}
    password: ${DB_PASSWORD:mockit_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  # Liquibase міграції
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public

  # Redis - через .env (AWS ElastiCache), з підтримкою TLS
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      # SSL/TLS - вмикається на AWS (REDIS_SSL=true), локально вимкнено
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.example: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    liquibase: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    per-endpoint-per-minute: 60
    per-user-per-minute: 1000
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-secret-key}
    expiration-ms: 86400000
  mock:
    max-body-size-kb: 1024
    default-ttl-hours: 168