<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>WebSocket тест — Mock-It логи</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; }
        input { width: 100%; padding: 8px; margin: 4px 0; }
        button { padding: 10px 20px; cursor: pointer; }
        #logs { margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 200px; }
        .log { padding: 6px; border-bottom: 1px solid #eee; font-family: monospace; }
        .status { color: green; }
    </style>
</head>
<body>
    <h2>WebSocket тест — логи в реальному часі</h2>

    <label>JWT токен (з /api/v1/auth/login):</label>
    <input id="token" placeholder="eyJhbGci...">

    <label>Endpoint ID (з відповіді створення ендпоінта):</label>
    <input id="endpointId" placeholder="напр. b221d101-adc6-...">

    <button onclick="connect()">Підключитись</button>
    <button onclick="disconnect()">Відключитись</button>

    <div id="status" class="status">Не підключено</div>
    <div id="logs"></div>

    <script>
        let stompClient = null;
        // Через Swagger: залогінься → скопіюй token; створи mock-ендпоінт → скопіюй його id
        // Встав token і endpointId, натисни Підключитись → статус "Підключено"
        //В іншій вкладці виклич mock-URL (http://localhost:8080/mock/{hash}/api/users)
        //У ws-test.html має сам з'явитись новий лог у реальному часі
        function connect() {
            const token = document.getElementById('token').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();

            const socket = new SockJS('http://localhost:8080/ws/logs');
            stompClient = Stomp.over(socket);

            const headers = { 'Authorization': 'Bearer ' + token };

            stompClient.connect(headers, function (frame) {
                document.getElementById('status').textContent = 'Підключено ✓';
                // Підписка на логи конкретного ендпоінта
                stompClient.subscribe('/topic/logs/' + endpointId, function (message) {
                    const dto = JSON.parse(message.body);
                    addLog(JSON.stringify(dto));
                });
            }, function (error) {
                document.getElementById('status').textContent = 'Помилка: ' + error;
            });
        }

        function disconnect() {
            if (stompClient) stompClient.disconnect();
            document.getElementById('status').textContent = 'Відключено';
        }

        function addLog(text) {
            const div = document.createElement('div');
            div.className = 'log';
            div.textContent = new Date().toLocaleTimeString() + ' — ' + text;
            document.getElementById('logs').prepend(div);
        }
    </script>
</body>
</html>
