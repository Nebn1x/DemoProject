spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    # Дозволяємо Hibernate самому визначити діалект для H2
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false
    # Кеш - простий in-memory, БЕЗ Redis
    cache:
      type: simple
  # вимикаємо rate-limit у тестах (щоб не чіплявся до Redis)
  app:
    base-url: http://localhost:8080
    rate-limit:
      enabled: false
    jwt:
      secret: test-secret-key-at-least-256-bits-long-for-testing-purposes-only-ok
      expiration-ms: 86400000